version: '3.8'

services:
  # Development Next.js application with hot reload
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - redis
      - postgres
    networks:
      - devnet-network

  # Redis for session storage and caching
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - devnet-network

  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=devnet
      - POSTGRES_USER=devnet_user
      - POSTGRES_PASSWORD=devnet_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - devnet-network

  # MinIO for file storage
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=devnet_admin
      - MINIO_ROOT_PASSWORD=devnet_password123
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - devnet-network

volumes:
  postgres-data:
  redis-data:
  minio-data:

networks:
  devnet-network:
    driver: bridge
